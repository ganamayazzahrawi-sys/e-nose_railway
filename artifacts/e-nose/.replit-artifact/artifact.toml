kind = "web"
previewPath = "/"
title = "E-Nose System"
version = "1.0.0"
id = "artifacts/e-nose"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19794
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/e-nose run dev"

[services.env]
PORT = "19794"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/e-nose", "run", "build"]
publicDir = "artifacts/e-nose/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
