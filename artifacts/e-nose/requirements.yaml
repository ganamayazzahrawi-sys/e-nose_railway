  - path: "artifacts/e-nose/public/images/hero-abstract.png"
    description: "Abstract modern medical technology background with soft glowing cyan and blue data waves, depth of field, 3d render, premium clean scientific aesthetic"
    aspect_ratio: "16:9"

notes:
